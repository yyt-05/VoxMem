<script>
document.addEventListener('DOMContentLoaded', function() {
// State variables
let isRecording = false;
let partialText = '';
let finalText = '';
let currentMode = '聊天';
let intervalId = null;
let hotwords = [
{ id: 1, original: '阿巴阿巴', corrected: '你好', weight: 3, hits: 12 },
{ id: 2, original: '就是说', corrected: '', weight: 2, hits: 8 },
{ id: 3, original: '那个嘛', corrected: '', weight: 1, hits: 5 },
{ id: 4, original: '人工智能', corrected: 'AI', weight: 4, hits: 20 },
{ id: 5, original: '机器学习', corrected: 'ML', weight: 3, hits: 15 }
];
let nextHotwordId = 6;
// Sample texts for simulation
const sampleTexts = [
'今天天气不错，我们去公园散步吧',
'人工智能技术正在快速发展',
'语音识别准确率有了显著提升',
'用户体验设计很重要',
'小清新风格让人感觉舒适'
];
// DOM elements
const textArea = document.getElementById('textArea');
const partialTextDisplay = document.getElementById('partialTextDisplay');
const recordBtn = document.getElementById('recordBtn');
const acceptBtn = document.getElementById('acceptBtn');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const showMetricsBtn = document.getElementById('showMetricsBtn');
const showHotwordsBtn = document.getElementById('showHotwordsBtn');
const metricsModal = document.getElementById('metricsModal');
const hotwordsModal = document.getElementById('hotwordsModal');
const closeMetricsModal = document.getElementById('closeMetricsModal');
const closeHotwordsModal = document.getElementById('closeHotwordsModal');
const newOriginal = document.getElementById('newOriginal');
const newCorrected = document.getElementById('newCorrected');
const addHotwordBtn = document.getElementById('addHotwordBtn');
const sceneBtns = document.querySelectorAll('.scene-btn');
// Initialize ECharts
const metricsChartDom = document.getElementById('metricsChart');
const metricsChart = echarts.init(metricsChartDom);
const metricsChartOption = {
tooltip: {
trigger: 'axis'
},
legend: {
data: ['识别前', '识别后']
},
grid: {
left: '3%',
right: '4%',
bottom: '3%',
containLabel: true
},
xAxis: {
type: 'category',
boundaryGap: false,
data: ['CER', '延迟', '命中率']
},
yAxis: {
type: 'value',
name: '数值'
},
series: [
{
name: '识别前',
type: 'line',
stack: '总量',
data: [12.5, 800, 0],
itemStyle: {
color: '#ff6b6b'
}
},
{
name: '识别后',
type: 'line',
stack: '总量',
data: [3.2, 650, 78],
itemStyle: {
color: '#51cf66'
}
}
],
animation: false
};
metricsChart.setOption(metricsChartOption);
// Update text area content
function updateTextArea() {
textArea.value = finalText + (finalText && partialText ? '\n\n' : '') + partialText;
updateButtonStates();
}
// Update button states based on content
function updateButtonStates() {
const hasContent = finalText || partialText;
acceptBtn.disabled = !hasContent;
copyBtn.disabled = !hasContent;
clearBtn.disabled = !hasContent;
}
// Simulate real-time recognition
function startRecording() {
isRecording = true;
recordBtn.innerHTML = '<i class="fas fa-stop text-xl" style="width: 1.5rem; height: 1.5rem; display: flex; justify-content: center; align-items: center;"></i>';
recordBtn.classList.add('animate-pulse', 'bg-red-500', 'text-white');
recordBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-gray-50');
intervalId = setInterval(() => {
const randomText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
const randomLength = Math.floor(Math.random() * randomText.length) + 1;
partialText = randomText.substring(0, randomLength);
if (partialTextDisplay.classList.contains('hidden')) {
partialTextDisplay.classList.remove('hidden');
}
partialTextDisplay.textContent = `正在识别: ${partialText}`;
updateTextArea();
}, 200);
}
function stopRecording() {
isRecording = false;
recordBtn.innerHTML = '<i class="fas fa-microphone text-xl" style="width: 1.5rem; height: 1.5rem; display: flex; justify-content: center; align-items: center;"></i>';
recordBtn.classList.remove('animate-pulse', 'bg-red-500', 'text-white');
recordBtn.classList.add('bg-white', 'text-gray-700', 'hover:bg-gray-50');
if (intervalId) {
clearInterval(intervalId);
}
}
// Event listeners
recordBtn.addEventListener('click', function() {
if (isRecording) {
stopRecording();
} else {
startRecording();
}
});
acceptBtn.addEventListener('click', function() {
if (partialText || finalText) {
finalText = finalText + (finalText ? '\n\n' : '') + (partialText || finalText);
partialText = '';
partialTextDisplay.classList.add('hidden');
updateTextArea();
showMessage('文本已接受');
}
});
copyBtn.addEventListener('click', function() {
navigator.clipboard.writeText(textArea.value).then(() => {
showMessage('已复制到剪贴板');
}).catch(err => {
console.error('Failed to copy: ', err);
});
});
clearBtn.addEventListener('click', function() {
finalText = '';
partialText = '';
partialTextDisplay.classList.add('hidden');
updateTextArea();
showMessage('文本已清空');
});
showMetricsBtn.addEventListener('click', function() {
metricsModal.classList.remove('hidden');
});
showHotwordsBtn.addEventListener('click', function() {
hotwordsModal.classList.remove('hidden');
});
closeMetricsModal.addEventListener('click', function() {
metricsModal.classList.add('hidden');
});
closeHotwordsModal.addEventListener('click', function() {
hotwordsModal.classList.add('hidden');
});
addHotwordBtn.addEventListener('click', function() {
if (newOriginal.value.trim()) {
const newItem = {
id: nextHotwordId++,
original: newOriginal.value,
corrected: newCorrected.value,
weight: 1,
hits: 0
};
hotwords.push(newItem);
newOriginal.value = '';
newCorrected.value = '';
updateHotwordsTable();
showMessage('热词已添加');
}
});
// Scene selection
sceneBtns.forEach(btn => {
btn.addEventListener('click', function() {
currentMode = this.getAttribute('data-mode');
sceneBtns.forEach(b => {
b.classList.remove('bg-gradient-to-r', 'from-emerald-400', 'to-teal-500', 'text-white', 'shadow-md');
b.classList.add('text-gray-600', 'hover:bg-gray-100');
});
this.classList.remove('text-gray-600', 'hover:bg-gray-100');
this.classList.add('bg-gradient-to-r', 'from-emerald-400', 'to-teal-500', 'text-white', 'shadow-md');
});
});
// Set initial active scene
document.querySelector(`.scene-btn[data-mode="${currentMode}"]`).classList.remove('text-gray-600', 'hover:bg-gray-100');
document.querySelector(`.scene-btn[data-mode="${currentMode}"]`).classList.add('bg-gradient-to-r', 'from-emerald-400', 'to-teal-500', 'text-white', 'shadow-md');
// Post-processing mode selection
postModeBtns.forEach(btn => {
btn.addEventListener('click', function() {
currentPostMode = this.getAttribute('data-post-mode');
postModeBtns.forEach(b => {
b.classList.remove('bg-gradient-to-r', 'from-emerald-400', 'to-teal-500', 'text-white', 'shadow-md');
b.classList.add('text-gray-600', 'hover:bg-gray-100');
});
this.classList.remove('text-gray-600', 'hover:bg-gray-100');
this.classList.add('bg-gradient-to-r', 'from-emerald-400', 'to-teal-500', 'text-white', 'shadow-md');
// Show message about mode change
const modeDescription = {
'原声模式': '保留原话，仅做专名/错字修正',
'轻整理模式': '自动标点、轻微清理',
'清爽模式': '去口头禅，适合日报/笔记',
'逻辑修正模式': '异步AI句序整理、书面化'
};
showMessage(`${currentPostMode}：${modeDescription[currentPostMode]}`);
});
});
// Set initial active post-processing mode
document.querySelector(`.post-mode-btn[data-post-mode="${currentPostMode}"]`).classList.remove('text-gray-600', 'hover:bg-gray-100');
document.querySelector(`.post-mode-btn[data-post-mode="${currentPostMode}"]`).classList.add('bg-gradient-to-r', 'from-emerald-400', 'to-teal-500', 'text-white', 'shadow-md');
// Delete hotword functionality
function updateHotwordsTable() {
const tableBody = document.getElementById('hotwordsTableBody');
tableBody.innerHTML = '';
hotwords.forEach(hotword => {
const row = document.createElement('tr');
row.innerHTML = `
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${hotword.original}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${hotword.corrected}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${hotword.weight}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${hotword.hits}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm">
<button class="delete-hotword-btn bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
<i class="fas fa-trash" style="width: 1rem; height: 1rem; display: flex; justify-content: center; align-items: center;"></i>
</button>
</td>
`;
tableBody.appendChild(row);
});
// Add event listeners to delete buttons
document.querySelectorAll('.delete-hotword-btn').forEach(btn => {
btn.addEventListener('click', function() {
const row = this.closest('tr');
const original = row.cells[0].textContent;
hotwords = hotwords.filter(item => item.original !== original);
row.remove();
showMessage('热词已删除');
});
});
}
// Initial update of button states
updateButtonStates();
// Show message function
function showMessage(message) {
// Create a temporary message element
const messageEl = document.createElement('div');
messageEl.textContent = message;
messageEl.style.position = 'fixed';
messageEl.style.top = '20px';
messageEl.style.left = '50%';
messageEl.style.transform = 'translateX(-50%)';
messageEl.style.backgroundColor = '#10b981';
messageEl.style.color = 'white';
messageEl.style.padding = '8px 16px';
messageEl.style.borderRadius = '4px';
messageEl.style.zIndex = '1000';
messageEl.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
document.body.appendChild(messageEl);
setTimeout(() => {
document.body.removeChild(messageEl);
}, 2000);
}
// Close modals when clicking outside
window.addEventListener('click', function(event) {
if (event.target === metricsModal) {
metricsModal.classList.add('hidden');
}
if (event.target === hotwordsModal) {
hotwordsModal.classList.add('hidden');
}
});
});
</script>
